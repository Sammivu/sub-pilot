spring:
  application:
    name: subpilot-backend

  # ── Virtual Threads (Java 21 Project Loom) ──────────────────────────────────
  threads:
    virtual:
      enabled: true

  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/subpilot}
    username: ${DATABASE_USERNAME:subpilot}
    password: ${DATABASE_PASSWORD:subpilot_secret}
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # ── JPA ─────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: validate        # Flyway owns the schema — never let Hibernate touch it
    show-sql: false
    open-in-view: false         # Prevent lazy-loading anti-pattern
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50

  # ── Flyway ──────────────────────────────────────────────────────────────────
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ── Redis ───────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # ── Mail ────────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.resend.com}
    port: ${MAIL_PORT:465}
    username: ${MAIL_USERNAME:resend}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          ssl:
            enable: true

# ── Server ──────────────────────────────────────────────────────────────────
server:
  port: ${PORT:8080}
  servlet:
    context-path: /api

# ── SubPilot App Config ──────────────────────────────────────────────────────
subpilot:

  # JWT
  jwt:
    secret: ${JWT_SECRET:this-is-a-dev-secret-change-it-in-production-min-256-bits}
    expiration-ms: 86400000        # 24 hours

  # Nomba Integration
  nomba:
    base-url: ${NOMBA_BASE_URL:https://sandbox.api.nomba.com/v1}
    account-id: ${NOMBA_ACCOUNT_ID:}
    client-id: ${NOMBA_CLIENT_ID:}
    client-secret: ${NOMBA_CLIENT_SECRET:}
    webhook-secret: ${NOMBA_WEBHOOK_SECRET}
    mock-mode: ${NOMBA_MOCK_MODE:true}     # flip to false once keys arrive

  # Platform Fees — SubPilot's own take-rate on every successful charge.
  # Per-merchant overrides live on the merchants table (fee_bps / fee_fixed_minor)
  # and take precedence over these defaults when set.
  fees:
    default-bps: ${PLATFORM_FEE_BPS:150}            # 150 bps = 1.5%
    default-fixed-minor: ${PLATFORM_FEE_FIXED_MINOR:10000}  # ₦100.00 in kobo
    min-fee-minor: ${PLATFORM_FEE_MIN_MINOR:0}       # optional floor per transaction
    max-fee-minor: ${PLATFORM_FEE_MAX_MINOR:}        # optional cap per transaction (blank = no cap)

  # Frontend URLs (for email links, CORS)
  frontend:
    base-url: ${FRONTEND_BASE_URL:http://localhost:5173}

  # Billing Engine
  billing:
    job-enabled: ${BILLING_JOB_ENABLED:true}
    interval-ms: ${BILLING_JOB_INTERVAL_MS:300000}

  # Email
  mail:
    from: ${MAIL_FROM:noreply@subpilot.co}
    from-name: ${MAIL_FROM_NAME:SubPilot}

# ── Actuator ────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

# ── Logging ─────────────────────────────────────────────────────────────────
logging:
  level:
    co.subpilot: INFO
    org.springframework.security: WARN
    org.hibernate.SQL: WARN
